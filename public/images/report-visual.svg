  <g fill="none" stroke-linecap="round"><path d="M300 382c74-52 150-52 232 0" stroke="url(#gold)" stroke-width="7"/><path d="M295 468c93-64 180-64 276-4" stroke="#80edf3" stroke-width="5" opacity=".65"/><path d="M406 292c-24 156-14 295 44 408" stroke="url(#gold)" stroke-width="6" opacity=".72"/><path d="M704 338c112-78 246-78 350 4" stroke="url(#gold)" stroke-width="8"/><path d="M692 455c148-95 284-94 424 0" stroke="#80edf3" stroke-width="6" opacity=".68"/><path d="M840 250c-40 196-24 360 62 500" stroke="url(#gold)" stroke-width="7" opacity=".74"/><path d="M1016 326c-76 118-102 254-72 408" stroke="#80edf3" stroke-width="5" opacity=".52"/></g>
  <g fill="none" opacity=".8"><circle cx="1136" cy="430" r="92" stroke="#80edf3" stroke-width="5"/><circle cx="1136" cy="430" r="58" stroke="#c5a46b" stroke-width="7"/><path d="M1034 606h180M1034 650h238M1034 694h128" stroke="#fff" stroke-opacity=".16" stroke-width="12" stroke-linecap="round"/><path d="M288 620h155M288 664h224M288 708h118" stroke="#fff" stroke-opacity=".14" stroke-width="11" stroke-linecap="round"/></g>
  <g fill="#80edf3" opacity=".38"><circle cx="182" cy="148" r="4"/><circle cx="1298" cy="156" r="3"/><circle cx="1390" cy="850" r="4"/><circle cx="146" cy="822" r="3"/><circle cx="760" cy="92" r="3"/></g>
</svg>
