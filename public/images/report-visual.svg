<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Premium AI palm report visual</title>
  <desc id="desc">Abstract report cards with palm-line diagrams and glowing AI scan elements.</desc>
  <defs>
    <radialGradient id="report-bg" cx="50%" cy="38%" r="70%"><stop offset="0%" stop-color="#2a1a40"/><stop offset="55%" stop-color="#111116"/><stop offset="100%" stop-color="#050507"/></radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity=".13"/><stop offset="100%" stop-color="#ffffff" stop-opacity=".035"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f2d492"/><stop offset="100%" stop-color="#a78246"/></linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="18" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#report-bg)"/>
  <circle cx="800" cy="500" r="410" fill="#80edf3" opacity=".08" filter="url(#glow)"/>
